<template>
    <lightning-card title="Account Ultimate Hierarchy" icon-name="standard:hierarchy">
        <div slot="actions">
            <lightning-button-group>
                <lightning-button 
                    label="Expand All" 
                    icon-name="utility:expand_all" 
                    onclick={handleExpandAll}>
                </lightning-button>
                <lightning-button 
                    label="Collapse All" 
                    icon-name="utility:collapse_all" 
                    onclick={handleCollapseAll}>
                </lightning-button>
                <lightning-button 
                    label="Refresh" 
                    icon-name="utility:refresh" 
                    onclick={handleRefresh}>
                </lightning-button>
            </lightning-button-group>
        </div>

        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <template if:true={isLoading}>
                <div class="slds-align_absolute-center slds-p-around_large">
                    <lightning-spinner alternative-text="Fetching hierarchy..." size="medium"></lightning-spinner>
                </div>
            </template>

            <template if:false={isLoading}>
                <template if:true={error}>
                    <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                        <lightning-icon icon-name="utility:error" size="x-small" class="slds-m-right_x-small" alternative-text="Error"></lightning-icon>
                        <h2>{error}</h2>
                    </div>
                </template>

                <template if:false={error}>
                    <template if:true={gridData.length}>
                        <div class="tree-grid-wrapper slds-border_top slds-border_bottom slds-border_left slds-border_right">
                            <lightning-tree-grid
                                columns={columns}
                                data={gridData}
                                key-field="id"
                                onrowaction={handleRowAction}
                                hide-checkbox-column
                                class="hierarchy-tree-grid">
                            </lightning-tree-grid>
                        </div>
                    </template>
                    <template if:false={gridData.length}>
                        <div class="slds-align_absolute-center slds-p-around_large slds-text-color_weak">
                            No hierarchy records (Accounts, Contacts, or Addresses) found.
                        </div>
                    </template>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
